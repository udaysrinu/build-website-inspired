name: Bug Report
description: Report a bug or unexpected behavior
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! Please fill out the form below so we can reproduce and fix it.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of what the bug is.
      placeholder: What happened?
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: Step-by-step instructions to reproduce the behavior.
      placeholder: |
        1. Run `/build-website-inspired "premium fintech dashboard"`
        2. Phase 1 starts extracting from runway.com
        3. See error in terminal...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened? Include error messages or screenshots if possible.
    validations:
      required: true

  - type: input
    id: target-url
    attributes:
      label: Category or URLs
      description: The category description or list of URLs you used.
      placeholder: "premium fintech risk dashboard"

  - type: dropdown
    id: os
    attributes:
      label: Operating System
      options:
        - macOS
        - Windows
        - Linux
    validations:
      required: true

  - type: input
    id: agent
    attributes:
      label: AI agent used
      description: Which agent invoked the skill? (Claude Code, Codex, Cursor, etc.)
      placeholder: Claude Code 1.x.x
    validations:
      required: true

  - type: input
    id: playwright-mcp
    attributes:
      label: Playwright MCP connected?
      description: Was Playwright MCP available at invocation time?
      placeholder: "yes / no"

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Any other context, logs, or screenshots.
